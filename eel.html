<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Electric Eel</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
        overflow: hidden;

        /* ⚡ ELECTRIC BACKGROUND */
        background: linear-gradient(
            to bottom,
            #0f2027,
            #203a43,
            #2c5364
        );
    }

    .container {
        width: 90%;
        max-width: 600px;

        padding: 40px;
        border-radius: 25px;

        text-align: center;

        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(20px);

        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);

        position: relative;
        z-index: 2;
    }

    /* ⚡ HEADER */
    h1 {
        font-size: 28px;
        margin-bottom: 20px;

        color: #ffd700;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;
    }

    /* 📖 POEM */
    .poem {
        font-size: 18px;
        line-height: 1.8;
        color: white;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;
    }

    /* BUTTON */
    .btn {
        display: block;
        margin-top: 25px;
        padding: 15px;

        background: #b8860b;
        color: white;

        text-decoration: none;
        border-radius: 12px;

        font-size: 17px;
        font-weight: bold;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;

        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .btn:hover {
        background: #d4a017;
        transform: scale(1.05);
        box-shadow: 0 0 15px #ffd700, 0 0 30px #ffcc00;
    }

    .btn:active {
        transform: scale(0.95);
    }

    /* ⚡ ELECTRIC SPARKS */
    .spark {
        position: absolute;
        color: #ffd700;
        font-size: 18px;
        animation: sparkMove linear infinite;
        opacity: 0.8;
    }

    @keyframes sparkMove {
        0% {
            transform: translateY(100vh);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }

    /* 💧 RIPPLE */
    .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple 0.6s linear;
        background: rgba(255,255,255,0.5);
        pointer-events: none;
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

</style>

</head>

<body>

<!-- ⚡ SPARK EFFECT -->
<div class="spark" style="left:10%; animation-duration:8s;">⚡</div>
<div class="spark" style="left:30%; animation-duration:10s;">⚡</div>
<div class="spark" style="left:50%; animation-duration:7s;">⚡</div>
<div class="spark" style="left:70%; animation-duration:9s;">⚡</div>
<div class="spark" style="left:85%; animation-duration:11s;">⚡</div>

<div class="container">

    <h1>⚡ The Electric Eel<br>by Denis Rodger</h1>

    <div class="poem">
        <p>
        If swimming, you would give a squeal<br>
        if you should come across an eel.<br>
        Hi slimy, snake-like look is mocking.<br>
        Worst of all, his touch is shocking!
        </p>

        <br>

        <p>
        No, you don't have to like him much.<br>
        And if you see him: look, don't touch!
        </p>
    </div>

    <a href="page3.html" class="btn">⬅ BACK</a>

</div>

<!-- 💧 RIPPLE SCRIPT -->
<script>
document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", function(e) {
        const circle = document.createElement("span");
        circle.classList.add("ripple");

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = e.clientX - rect.left - size / 2 + "px";
        circle.style.top = e.clientY - rect.top - size / 2 + "px";

        this.appendChild(circle);

        setTimeout(() => circle.remove(), 600);
    });
});
</script>

</body>
</html>
