<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Animal Poems</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;

        background: linear-gradient(
            to bottom,
            #e0f2ff,
            #87CEEB,
            #4da6ff
        );
    }

    .container {
        width: 90%;
        max-width: 600px;

        padding: 40px;
        border-radius: 25px;

        text-align: center;

        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(18px);

        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    }

    /* HEADER */
    h1 {
        font-size: 30px;
        margin-bottom: 25px;
        font-family: "Kristen ITC", "Comic Sans MS", cursive;
    }

    /* BASE BUTTON */
    .btn {
        display: block;
        margin: 15px 0;
        padding: 16px;

        color: white;
        text-decoration: none;
        border-radius: 12px;

        font-size: 17px;
        font-weight: bold;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;

        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* DEFAULT BUTTON */
    .default-btn {
        background: black;
    }

    .default-btn:hover {
        background: #222;
    }

    /* ⚡ ELECTRIC EEL */
    .eel-btn {
        background: #b8860b;
    }

    .eel-btn:hover {
        background: #d4a017;
        box-shadow: 0 0 15px #ffd700, 0 0 30px #ffcc00;
    }

    /* 🦆 PLATYPUS */
    .platypus-btn {
        background: #006400;
    }

    .platypus-btn:hover {
        background: #228B22;
        box-shadow: 0 0 15px #32cd32, 0 0 30px #228b22;
    }

    /* ✨ HOVER */
    .btn:hover {
        transform: translateY(-4px) scale(1.05);
    }

    /* 💥 CLICK */
    .btn:active {
        transform: scale(0.95);
    }

    /* 🌊 SHINE */
    .btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.2);
        transition: 0.5s;
    }

    .btn:hover::after {
        left: 100%;
    }

    /* 💧 RIPPLE */
    .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple 0.6s linear;
        background: rgba(255,255,255,0.5);
        pointer-events: none;
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

</style>

</head>

<body>

<div class="container">

    <h1>🐾 FUN ANIMAL POEMS</h1>

    <!-- BUTTONS -->
    <a href="eel.html" class="btn eel-btn">⚡ The Electric Eel: by Denis Rodger</a>
    <a href="platypus.html" class="btn platypus-btn">🦆 Duck-billed Platypus</a>

    <!-- BACK -->
    <a href="page2.html" class="btn default-btn">⬅ BACK</a>

</div>

<!-- 💧 RIPPLE SCRIPT -->
<script>
document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", function(e) {
        const circle = document.createElement("span");
        circle.classList.add("ripple");

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = e.clientX - rect.left - size / 2 + "px";
        circle.style.top = e.clientY - rect.top - size / 2 + "px";

        this.appendChild(circle);

        setTimeout(() => {
            circle.remove();
        }, 600);
    });
});
</script>

</body>
</html>
