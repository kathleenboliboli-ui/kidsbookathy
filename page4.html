<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fun Animal Stories</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;

        background: linear-gradient(
            to bottom,
            #e0f2ff,
            #87CEEB,
            #4da6ff
        );
    }

    .container {
        width: 90%;
        max-width: 600px;

        padding: 40px;
        border-radius: 25px;

        text-align: center;

        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(18px);

        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 15px 50px rgba(0,0,0,0.25);
    }

    /* HEADER */
    h1 {
        font-size: 30px;
        margin-bottom: 25px;
        font-family: "Kristen ITC", "Comic Sans MS", cursive;
    }

    /* BASE BUTTON */
    .btn {
        display: block;
        margin: 15px 0;
        padding: 16px;

        color: white;
        text-decoration: none;
        border-radius: 12px;

        font-size: 17px;
        font-weight: bold;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;

        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    /* DEFAULT BUTTON */
    .default-btn {
        background: black;
    }

    .default-btn:hover {
        background: #222;
    }

    /* 🐊 CROCODILE (Jungle Green) */
    .croc-btn {
        background: #1e7a1e;
    }

    .croc-btn:hover {
        background: #28a745;
        box-shadow: 0 0 15px #28a745, 0 0 30px #1e7a1e;
    }

    /* 🐔 CHICKEN (Golden Yellow) */
    .chicken-btn {
        background: #d4a017;
    }

    .chicken-btn:hover {
        background: #ffcc00;
        box-shadow: 0 0 15px #ffcc00, 0 0 30px #d4a017;
    }

    /* 🐻 BEAR (Earth Brown) */
    .bear-btn {
        background: #6b4f2a;
    }

    .bear-btn:hover {
        background: #8b6b3e;
        box-shadow: 0 0 15px #8b6b3e, 0 0 30px #6b4f2a;
    }

    /* 🐒 MONKEY (Warm Orange) */
    .monkey-btn {
        background: #e67e22;
    }

    .monkey-btn:hover {
        background: #ff944d;
        box-shadow: 0 0 15px #ff944d, 0 0 30px #e67e22;
    }

    /* ✨ HOVER */
    .btn:hover {
        transform: translateY(-4px) scale(1.05);
    }

    /* 💥 CLICK */
    .btn:active {
        transform: scale(0.95);
    }

    /* 🌊 SHINE */
    .btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.2);
        transition: 0.5s;
    }

    .btn:hover::after {
        left: 100%;
    }

    /* 💧 RIPPLE */
    .ripple {
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        animation: ripple 0.6s linear;
        background: rgba(255,255,255,0.5);
        pointer-events: none;
    }

    @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
    }

</style>

</head>

<body>

<div class="container">

    <h1>🌿 FUN ANIMAL STORIES 🐾</h1>

    <!-- STORY BUTTONS -->
<a href="story1.html" class="btn croc-btn">🐊 The Big Silly Crocodile</a>
<a href="story2.html" class="btn croc-btn">🐊 The Enormous Crocodile</a>
<a href="story3.html" class="btn chicken-btn">🐔 The Chicken Who Wanted to Fly</a>
<a href="story4.html" class="btn bear-btn">🐻 Does A Bear Poo in the Woods!?</a>
<a href="story5.html" class="btn monkey-btn">🐒 The Monkeys and the Bell</a>

    <!-- BACK -->
    <a href="page2.html" class="btn default-btn">⬅ BACK</a>

</div>

<!-- 💧 RIPPLE SCRIPT -->
<script>
document.querySelectorAll(".btn").forEach(button => {
    button.addEventListener("click", function(e) {
        const circle = document.createElement("span");
        circle.classList.add("ripple");

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        circle.style.width = circle.style.height = size + "px";
        circle.style.left = e.clientX - rect.left - size / 2 + "px";
        circle.style.top = e.clientY - rect.top - size / 2 + "px";

        this.appendChild(circle);

        setTimeout(() => {
            circle.remove();
        }, 600);
    });
});
</script>

</body>
</html>
