<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;

        display: flex;
        justify-content: center;
        align-items: center;

        height: 100vh;
        overflow: hidden;

        background: linear-gradient(
            to bottom,
            #e0f2ff,
            #87CEEB,
            #4da6ff
        );
    }

    .container {
        width: 90%;
        max-width: 500px;

        padding: 40px;
        border-radius: 25px;

        text-align: center;

        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(20px);

        border: 1px solid rgba(255,255,255,0.3);
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);

        position: relative;
        z-index: 2;
    }

    .profile-img {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;

        border: 4px solid white;

        box-shadow:
            0 0 20px #87CEEB,
            0 0 40px #4da6ff,
            0 0 60px #00c6ff;

        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }

    h1 {
        margin: 25px 0 10px;
        font-size: 32px;
        white-space: nowrap;
        font-family: "Lucida Calligraphy", cursive;
    }

    p {
        font-size: 18px;
        color: #000;
        font-weight: bold;
        margin-bottom: 25px;
    }

    .btn {
        display: block;
        width: 100%;
        margin: 12px 0;
        padding: 16px;

        background: black;
        color: white;

        text-decoration: none;
        border-radius: 12px;

        font-size: 18px;
        font-weight: bold;

        font-family: "Kristen ITC", "Comic Sans MS", cursive;

        transition: 0.3s;
    }

    .btn:hover {
        background: #222;
        transform: scale(1.05);
    }

    /* 🤍 FLOATING HEARTS */
    .heart {
        position: absolute;
        color: white;
        font-size: 20px;
        opacity: 0.8;
        animation: floatUp linear infinite;
        z-index: 1;
    }

    @keyframes floatUp {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1.2);
            opacity: 0;
        }
    }

</style>

</head>

<body>

<!-- 🤍 FLOATING HEARTS -->
<div class="heart" style="left:10%; animation-duration:10s;">🤍</div>
<div class="heart" style="left:30%; animation-duration:12s;">🤍</div>
<div class="heart" style="left:50%; animation-duration:9s;">🤍</div>
<div class="heart" style="left:70%; animation-duration:11s;">🤍</div>
<div class="heart" style="left:85%; animation-duration:13s;">🤍</div>

<div class="container">

    <img src="profile.jpg" class="profile-img">

    <h1>Kathleen Onggie Boliboli</h1>

    <p>Grade 11 ICT - Lourdes College, Inc.</p>

    <a href="page2.html" class="btn">FUN STORIES FOR KIDS</a>

</div>

</body>
</html>
